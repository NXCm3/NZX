# ============================================================
# wrangler.toml — 主配置，用于 Cloudflare Pages 部署
# 部署命令:  wrangler pages deploy --commit-dirty=true
#           (Pages 会自动读取本文件并识别 D1/R2/变量绑定)
# ============================================================
name = "nzx"
pages_build_output_dir = "dist"
compatibility_date = "2024-01-01"

# R2 Bucket 绑定（Pages Functions / _worker.js 中通过 env.R2_BUCKET 访问）
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "my-r2-nxc"

# D1 数据库绑定（Pages Functions / _worker.js 中通过 env.DB 访问）
[[d1_databases]]
binding = "DB"
database_name = "video-platform-db"
database_id = "a736be56-ac8a-4437-ac48-50fa98d3740d"

# 环境变量
[vars]
ALLOWED_ORIGINS = "*"
R2_PUBLIC_URL = "https://pub-3300c5431c524c789f6aa30ae9bad4a9.r2.dev"
R2_ACCOUNT_ID = "09a7ba6e7eae31ff8fdee225589f1a52"
R2_ACCESS_KEY_ID = "8d712ad9c4333ea3634668251a02c28f"
R2_SECRET_ACCESS_KEY = "97b0c4859949dc32a30463bc920198466e4d27553405e8916a591748b7e3572d"
